<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WordPress Playground - Mica OS Depth</title>
<style>
  :root {
    --accent: #0067c0;
    --accent-2: #3a96dd;
    --accent-soft: rgba(0, 103, 192, .11);
    --accent-line: rgba(0, 103, 192, .34);
    --ink: #1f2328;
    --ink-2: #3f4752;
    --muted: #66717f;
    --line: rgba(30, 42, 56, .16);
    --surface: rgba(250, 252, 255, .72);
    --surface-2: rgba(244, 248, 252, .83);
    --surface-solid: #f8fafc;
    --danger: #c42b1c;
    --warn: #9a6700;
    --ok: #107c10;
    --z0: 0px;
    --z1: 14px;
    --z2: 28px;
    --z3: 44px;
    --rail: 58px;
    --top: 48px;
    --pane: 392px;
    color-scheme: light;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(920px 620px at 20% 5%, rgba(133, 197, 255, .64), transparent 62%),
      radial-gradient(780px 540px at 92% 18%, rgba(224, 244, 229, .74), transparent 58%),
      radial-gradient(700px 580px at 68% 92%, rgba(255, 222, 171, .58), transparent 58%),
      linear-gradient(135deg, #dfeaf7 0%, #f6f8fb 48%, #e8eef7 100%);
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    border: 0;
    cursor: pointer;
  }

  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .app {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .wp-frame-wrap {
    position: absolute;
    inset: var(--top) 0 0 var(--rail);
    background: #fff;
    z-index: 0;
    transition: filter .22s ease, transform .22s ease;
  }

  .wp-frame-wrap.soft-focus {
    filter: blur(1.6px) saturate(.9) brightness(.96);
  }

  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: white;
    filter: blur(var(--z0));
  }

  .mica {
    background: linear-gradient(180deg, rgba(255, 255, 255, .74), rgba(245, 249, 253, .62));
    border: 1px solid rgba(255, 255, 255, .76);
    box-shadow: 0 22px 54px rgba(30, 42, 56, .18), inset 0 1px 0 rgba(255, 255, 255, .86);
    backdrop-filter: blur(var(--z1)) saturate(1.2);
  }

  .topbar {
    position: absolute;
    inset: 10px 12px auto calc(var(--rail) + 12px);
    height: 38px;
    z-index: 14;
    display: grid;
    grid-template-columns: auto minmax(220px, 1fr) auto auto auto;
    gap: 8px;
    align-items: center;
    padding: 5px;
    border-radius: 10px;
  }

  .icon-btn,
  .rail-btn,
  .ghost-btn,
  .primary-btn,
  .danger-btn {
    min-height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    color: var(--ink);
    background: rgba(255, 255, 255, .46);
    border: 1px solid rgba(30, 42, 56, .12);
  }

  .icon-btn {
    width: 32px;
    padding: 0;
  }

  .icon-btn:hover,
  .ghost-btn:hover,
  .rail-btn:hover,
  .source-card:hover,
  .saved-site:hover,
  .bp-card:hover {
    background: rgba(255, 255, 255, .82);
    border-color: var(--accent-line);
  }

  .primary-btn {
    padding: 0 12px;
    color: #fff;
    background: var(--accent);
    border-color: rgba(0, 0, 0, .06);
  }

  .danger-btn {
    padding: 0 12px;
    color: #fff;
    background: var(--danger);
    border-color: rgba(0, 0, 0, .08);
  }

  .danger-btn:disabled {
    opacity: .45;
    cursor: default;
  }

  .ghost-btn {
    padding: 0 11px;
    background: rgba(255, 255, 255, .45);
  }

  .address {
    height: 28px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 7px;
    padding: 0 9px;
    border-radius: 8px;
    background: rgba(255, 255, 255, .72);
    border: 1px solid rgba(30, 42, 56, .14);
    min-width: 0;
  }

  .address input {
    border: 0;
    background: transparent;
    min-width: 0;
    color: var(--ink);
    font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
    font-size: 12px;
  }

  .address span,
  .kbd {
    color: var(--muted);
    font-size: 11px;
  }

  .save-btn[data-state="unsaved"] {
    color: #7a4a00;
    background: rgba(255, 244, 214, .9);
    border-color: rgba(154, 103, 0, .26);
  }

  .save-btn[data-state="saving"] {
    color: #004f94;
    background: rgba(225, 241, 255, .92);
    border-color: rgba(0, 103, 192, .28);
  }

  .save-btn[data-state="saved"] {
    color: #0b5a0b;
    background: rgba(228, 247, 228, .92);
    border-color: rgba(16, 124, 16, .28);
  }

  .rail {
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--rail);
    z-index: 15;
    padding: 12px 8px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    border-radius: 0 12px 12px 0;
  }

  .wp-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-weight: 650;
    color: #fff;
    background: linear-gradient(135deg, #005a9e, #53a8ea);
    box-shadow: 0 12px 24px rgba(0, 103, 192, .28);
    user-select: none;
  }

  .rail-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
  }

  .rail-btn {
    position: relative;
    width: 42px;
    height: 42px;
    padding: 0;
    background: rgba(255, 255, 255, .32);
  }

  .rail-btn svg,
  .icon-btn svg,
  .ghost-btn svg,
  .primary-btn svg,
  .danger-btn svg,
  .site-widget svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    stroke-width: 1.8;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .rail-btn.active {
    color: var(--accent);
    background: rgba(229, 244, 255, .92);
    border-color: var(--accent-line);
  }

  .rail-btn.active:before {
    content: "";
    position: absolute;
    left: -8px;
    width: 3px;
    height: 24px;
    border-radius: 99px;
    background: var(--accent);
  }

  .secondary {
    position: absolute;
    inset: var(--top) auto 0 var(--rail);
    width: var(--pane);
    z-index: 12;
    display: none;
    grid-template-rows: auto 1fr;
    border-radius: 0 12px 12px 0;
    border-left: 0;
    background: linear-gradient(180deg, rgba(250, 252, 255, .82), rgba(239, 246, 252, .76));
    backdrop-filter: blur(var(--z2)) saturate(1.3);
    box-shadow: 24px 0 60px rgba(30, 42, 56, .18), inset 1px 0 0 rgba(255, 255, 255, .65);
  }

  .secondary.open {
    display: grid;
  }

  .pane-head {
    min-height: 76px;
    padding: 16px 16px 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }

  .pane-title {
    margin: 0;
    font-size: 20px;
    letter-spacing: -.02em;
    font-weight: 650;
  }

  .pane-sub {
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
  }

  .pane-body {
    min-height: 0;
    overflow: auto;
    padding: 14px 16px 20px;
  }

  .segmented {
    display: grid;
    gap: 3px;
    padding: 3px;
    border-radius: 9px;
    background: rgba(30, 42, 56, .06);
    border: 1px solid rgba(30, 42, 56, .11);
    margin-bottom: 14px;
  }

  .segmented.sites { grid-template-columns: repeat(3, 1fr); }
  .segmented.manager { grid-template-columns: repeat(5, 1fr); }

  .segmented button {
    min-width: 0;
    height: 30px;
    border-radius: 7px;
    color: var(--ink-2);
    background: transparent;
    font-size: 12px;
    font-weight: 600;
  }

  .segmented button.active {
    color: var(--ink);
    background: rgba(255, 255, 255, .92);
    box-shadow: 0 1px 2px rgba(30, 42, 56, .16);
  }

  .section-label {
    margin: 16px 0 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-size: 11px;
    font-weight: 700;
  }

  .saved-list,
  .source-grid,
  .featured-list,
  .settings-grid {
    display: grid;
    gap: 8px;
  }

  .source-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .saved-site,
  .source-card,
  .featured-item,
  .notice,
  .field-row,
  .editor-box,
  .db-box,
  .log-box {
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, .58);
    border-radius: 10px;
  }

  .saved-site,
  .source-card,
  .featured-item {
    text-align: left;
  }

  .saved-site {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 9px;
  }

  .thumb {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(0, 103, 192, .12), rgba(16, 124, 16, .12)),
      linear-gradient(135deg, #f7fbff, #dceffa);
    display: grid;
    place-items: center;
    color: var(--accent);
    font-weight: 700;
  }

  .item-title {
    font-size: 13px;
    font-weight: 650;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-meta {
    margin-top: 2px;
    color: var(--muted);
    font-size: 11.5px;
  }

  .source-card {
    padding: 11px;
    min-height: 88px;
  }

  .source-card .icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .compact-input {
    width: 100%;
    height: 30px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, .72);
    padding: 0 9px;
    color: var(--ink);
    font-size: 12px;
    margin-top: 8px;
  }

  .featured-item {
    display: grid;
    grid-template-columns: 34px 1fr auto;
    align-items: center;
    gap: 9px;
    padding: 9px;
  }

  .tag-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .tag {
    border-radius: 99px;
    padding: 2px 7px;
    color: var(--muted);
    border: 1px solid rgba(30, 42, 56, .12);
    background: rgba(255, 255, 255, .58);
    font-size: 10.5px;
  }

  .site-widget {
    position: absolute;
    left: calc(var(--rail) + 16px);
    bottom: 18px;
    z-index: 16;
    min-width: 268px;
    max-width: min(360px, calc(100vw - var(--rail) - 36px));
    min-height: 54px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 12px;
    text-align: left;
  }

  .site-widget > span:nth-child(2) {
    min-width: 0;
  }

  .secondary.open ~ .site-widget {
    left: calc(var(--rail) + var(--pane) + 16px);
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 99px;
    background: var(--ok);
    box-shadow: 0 0 0 4px rgba(16, 124, 16, .14);
  }

  .site-name {
    font-size: 13px;
    font-weight: 700;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .site-status {
    margin-top: 2px;
    color: var(--muted);
    font-size: 11.5px;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .manager-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 12px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px;
  }

  .field-row label {
    display: block;
    font-size: 13px;
    font-weight: 600;
  }

  .field-row span {
    display: block;
    color: var(--muted);
    font-size: 11.5px;
    margin-top: 2px;
  }

  select,
  .text-input {
    height: 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, .72);
    padding: 0 9px;
    min-width: 124px;
    color: var(--ink);
  }

  .toggle {
    width: 42px;
    height: 22px;
    border-radius: 99px;
    background: rgba(30, 42, 56, .18);
    position: relative;
    border: 1px solid rgba(30, 42, 56, .12);
  }

  .toggle:after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 99px;
    background: #fff;
    box-shadow: 0 1px 2px rgba(30, 42, 56, .22);
  }

  .toggle.on {
    background: var(--accent);
  }

  .toggle.on:after {
    left: 21px;
  }

  .notice {
    padding: 10px;
    color: var(--ink-2);
    font-size: 12.5px;
    line-height: 1.4;
    background: rgba(255, 250, 230, .78);
    border-color: rgba(154, 103, 0, .22);
  }

  .notice.info {
    background: rgba(232, 244, 255, .74);
    border-color: rgba(0, 103, 192, .18);
  }

  .notice.success {
    background: rgba(232, 247, 232, .76);
    border-color: rgba(16, 124, 16, .2);
  }

  .notice .actions {
    display: flex;
    gap: 7px;
    margin-top: 9px;
  }

  .split {
    display: grid;
    grid-template-columns: 132px 1fr;
    gap: 10px;
    min-height: 364px;
  }

  .file-tree {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(255, 255, 255, .52);
    padding: 9px;
    font-family: "Cascadia Mono", Consolas, monospace;
    font-size: 11.5px;
    line-height: 1.8;
    overflow: auto;
  }

  .file-tree .folder {
    color: var(--accent);
    font-weight: 700;
  }

  .file-tree .picked {
    display: inline-block;
    padding: 0 5px;
    border-radius: 5px;
    color: var(--ink);
    background: rgba(0, 103, 192, .12);
  }

  .editor-box,
  textarea.editor-box {
    width: 100%;
    min-height: 364px;
    padding: 11px;
    resize: none;
    color: #102030;
    font-family: "Cascadia Mono", Consolas, monospace;
    font-size: 11.5px;
    line-height: 1.55;
    background: rgba(255, 255, 255, .72);
  }

  .blueprint-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 10px;
  }

  .db-box {
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th,
  td {
    padding: 8px;
    border-bottom: 1px solid rgba(30, 42, 56, .08);
    text-align: left;
  }

  th {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .log-toolbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 10px;
  }

  .log-box {
    padding: 10px;
    font-family: "Cascadia Mono", Consolas, monospace;
    font-size: 11.5px;
    line-height: 1.65;
    color: #243242;
    background: rgba(255, 255, 255, .72);
  }

  .log-box .warn { color: #8a5a00; font-weight: 700; }
  .log-box .error { color: var(--danger); font-weight: 700; }
  .log-box .info { color: var(--accent); font-weight: 700; }

  .more-menu {
    position: absolute;
    top: 52px;
    right: 58px;
    width: 268px;
    z-index: 30;
    display: none;
    padding: 6px;
    border-radius: 10px;
  }

  .more-menu.open {
    display: grid;
    gap: 4px;
  }

  .menu-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 8px;
    align-items: center;
    min-height: 44px;
    padding: 7px;
    border-radius: 8px;
    text-align: left;
    background: transparent;
    color: var(--ink);
  }

  .menu-item:hover {
    background: rgba(255, 255, 255, .72);
  }

  .toast {
    position: absolute;
    left: 76px;
    bottom: 88px;
    z-index: 80;
    min-width: 260px;
    max-width: 360px;
    display: none;
    grid-template-columns: auto 1fr;
    gap: 9px;
    align-items: start;
    padding: 11px 12px;
    border-radius: 12px;
  }

  .toast.show {
    display: grid;
  }

  .toast strong {
    display: block;
    font-size: 13px;
  }

  .toast span {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 12px;
  }

  .boot {
    position: absolute;
    inset: var(--top) 0 0 var(--rail);
    z-index: 8;
    display: none;
    place-items: center;
    background:
      radial-gradient(520px 340px at 50% 45%, rgba(0, 103, 192, .11), transparent 64%),
      rgba(246, 250, 253, .72);
    backdrop-filter: blur(7px);
  }

  .boot.show {
    display: grid;
  }

  .boot-card {
    width: 360px;
    padding: 18px;
    border-radius: 14px;
    text-align: center;
  }

  .spinner {
    width: 46px;
    height: 46px;
    margin: 0 auto 14px;
    border-radius: 99px;
    border: 3px solid rgba(0, 103, 192, .16);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .boot-card h2 {
    margin: 0 0 5px;
    font-size: 17px;
  }

  .boot-card p {
    margin: 0;
    color: var(--muted);
    font-size: 12.5px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 60;
    display: none;
    background: rgba(234, 242, 249, .54);
    backdrop-filter: blur(var(--z3)) saturate(1.2);
    padding: 34px;
  }

  .overlay.open {
    display: grid;
    place-items: center;
  }

  .library-shell {
    width: min(1180px, 100%);
    height: min(760px, 100%);
    display: grid;
    grid-template-columns: 224px 1fr;
    overflow: hidden;
    border-radius: 16px;
    background: rgba(250, 252, 255, .88);
    border: 1px solid rgba(255, 255, 255, .84);
    box-shadow: 0 40px 120px rgba(30, 42, 56, .26);
  }

  .library-side {
    padding: 16px;
    border-right: 1px solid var(--line);
    background: rgba(244, 248, 252, .72);
  }

  .library-side h3 {
    margin: 0 0 14px;
    font-size: 18px;
  }

  .cat-btn {
    width: 100%;
    height: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 9px;
    border-radius: 8px;
    background: transparent;
    color: var(--ink-2);
    text-align: left;
  }

  .cat-btn.active,
  .cat-btn:hover {
    background: rgba(255, 255, 255, .76);
    color: var(--accent);
  }

  .library-main {
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .library-top {
    display: grid;
    grid-template-columns: 1fr minmax(240px, 380px) auto;
    align-items: center;
    gap: 10px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }

  .library-top h2 {
    margin: 0;
    font-size: 20px;
  }

  .library-grid {
    min-height: 0;
    overflow: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    align-content: start;
  }

  .bp-card {
    min-height: 126px;
    padding: 11px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 7px;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, .66);
    text-align: left;
  }

  .bp-swatch {
    height: 36px;
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(0, 103, 192, .14), rgba(16, 124, 16, .08)),
      linear-gradient(90deg, rgba(255, 255, 255, .72), rgba(232, 244, 255, .88));
    border: 1px solid rgba(30, 42, 56, .08);
  }

  .bp-card h4 {
    margin: 0;
    font-size: 13px;
  }

  els.toastTitle.textContent = title;

  showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 3000);

function boot(title, text, done) {
  els.bootTitle.textContent = title;
  els.bootText.textContent = text;
  els.boot.classList.add("show");
  window.setTimeout(() => {
    els.boot.classList.remove("show");

  state.pane = state.pane === pane ? null : pane;

  updateChrome();

  if (state.pane === "manager") renderManager();

    <div class="section-label">Featured Blueprints</div>
    <div class="featured-list">
      ${blueprints.slice(0, 5).map(bp => `<button class="featured-item" type="button" data-blueprint="${bp[0]}"><span class="thumb">${bp[0].slice(0, 2).toUpperCase()}</span><span><span class="item-title">${bp[0]}</span><span class="item-meta">${bp[1]}</span></span>${iconChevron()}</button>`).join("")}
    </div>
    <button class="primary-btn" type="button" id="openLibrary" style="width:100%;margin-top:12px">View all 43 blueprints</button>
  `;
}

function renderManager() {
  els.paneTitle.textContent = "Site Manager";
  els.paneSub.textContent = "Settings, Files, Blueprint, Database, Logs";
  els.paneBody.innerHTML = `
    <div class="manager-tools">
      <button class="ghost-btn" type="button" data-path="/">Homepage</button>
      <button class="ghost-btn" type="button" data-path="/wp-admin/">WP Admin</button>
      <button class="ghost-btn" type="button" data-action="export-pr">Export GitHub PR</button>
      <button class="ghost-btn" type="button" data-action="download-zip">Download .zip</button>
    </div>
    <div class="segmented manager">
      ${["settings", "files", "blueprint", "database", "logs"].map(tab => `<button type="button" class="${state.managerTab === tab ? "active" : ""}" data-manager-tab="${tab}">${tab[0].toUpperCase() + tab.slice(1)}</button>`).join("")}
    </div>
    <div id="managerContent"></div>
  `;
  renderManagerContent();
}

function renderManagerContent() {
  const box = document.getElementById("managerContent");
  if (state.managerTab === "settings") {
    box.innerHTML = `
      <div class="notice">This is an Unsaved Playground.<br>Changes are lost on page refresh.<div class="actions"><button class="primary-btn" type="button" data-save-local>Save site locally</button></div></div>
      <div class="section-label">Runtime</div>
      <div class="settings-grid">
        <div class="field-row"><span><label>WordPress version</label><span>Change requires Apply Settings & Reset</span></span><select><option>6.7 stable</option><option>6.8 RC</option><option>WordPress Beta</option></select></div>
        <div class="field-row"><span><label>PHP version</label><span>WASM runtime selection</span></span><select><option>8.2</option><option>8.3</option><option>8.4</option></select></div>
        <div class="field-row"><span><label>Language</label><span>Install language packs</span></span><select><option>English (US)</option><option>Japanese</option><option>Polish</option></select></div>
        <div class="field-row"><span><label>Network access</label><span>Allow remote requests for blueprints</span></span><span class="toggle on" role="switch" aria-checked="true"></span></div>
        <div class="field-row"><span><label>Multisite</label><span>Enable network installation</span></span><span class="toggle" role="switch" aria-checked="false"></span></div>
      </div>
      <button class="danger-btn" type="button" id="resetBtn" style="width:100%;margin-top:12px">Apply Settings & Reset Playground</button>
    `;
    return;
  }
  if (state.managerTab === "files") {
    box.innerHTML = `
      <div class="blueprint-actions"><button class="ghost-btn" type="button">New File</button><button class="ghost-btn" type="button">New Folder</button></div>
      <div class="split">
        <div class="file-tree"><div class="folder">/wordpress</div><div>wp-admin/</div><div class="folder">wp-content/</div><div>&nbsp;themes/coffee-shop/</div><div>&nbsp;<span class="picked">functions.php</span></div><div>&nbsp;plugins/woocommerce/</div><div>wp-includes/</div></div>
        <textarea class="editor-box" spellcheck="false">add_action( 'init', function() {
    register_post_type( 'roast', array(
        'label' => 'Roasts',
        'public' => true,
        'show_in_rest' => true,
    ) );
} );</textarea>
      </div>
    `;
    return;
  }
  if (state.managerTab === "blueprint") {
    box.innerHTML = `
      <div class="blueprint-actions"><button class="ghost-btn" type="button" data-action="copy-blueprint">Copy link to blueprint</button><button class="ghost-btn" type="button" data-action="download-bundle">Download bundle</button><button class="primary-btn" type="button" data-run-blueprint>Run Blueprint</button></div>
      <div class="split">
        <div class="file-tree"><div class="folder">blueprint.json</div><div>attached-files/</div><div>&nbsp;products.wxr</div><div>&nbsp;theme.zip</div></div>
        <textarea class="editor-box" spellcheck="false">{
  "landingPage": "/wp-admin/post.php?post=14&action=edit",
  "preferredVersions": {
    "php": "8.2",
    "wp": "6.7"
  },
  "steps": [
    { "step": "installPlugin", "pluginZipFile": "woocommerce.zip" },
    { "step": "installTheme", "themeZipFile": "theme.zip" },
    { "step": "importWxr", "file": "attached-files/products.wxr" },
    { "step": "setSiteOptions", "options": { "blogname": "Coffee Shop" } }
  ]
}</textarea>
      </div>
    `;
    return;
  }
  if (state.managerTab === "database") {
    box.innerHTML = `
      <div class="notice info">Database management is an early access feature. Report issues in the GitHub issue tracker.</div>
      <div class="section-label">SQLite browser</div>
      <div class="db-box"><table><thead><tr><th>Table</th><th>Rows</th><th>Updated</th></tr></thead><tbody><tr><td>wp_posts</td><td>42</td><td>12:24:13</td></tr><tr><td>wp_options</td><td>184</td><td>12:23:58</td></tr><tr><td>wp_users</td><td>2</td><td>12:20:41</td></tr><tr><td>wp_wc_product_meta_lookup</td><td>12</td><td>12:18:09</td></tr></tbody></table></div>
    `;
    return;
  }
  box.innerHTML = `
    <div class="log-toolbar"><input class="text-input" value="deprecated OR warning" aria-label="Search logs"><button class="ghost-btn" type="button">Search</button></div>
    <div class="log-box">
      <div><span class="info">INFO</span> [12:20:12] WordPress 6.7 booted in 812 ms</div>
      <div><span class="warn">WARN</span> [12:21:04] strftime() is deprecated in theme/functions.php:42</div>
      <div><span class="error">ERROR</span> [12:21:44] include() failed opening wp-content/mu-plugins/demo.php</div>
      <div><span class="info">INFO</span> [12:22:03] GET /wp-admin/post.php 200 (212 ms . 41 queries . 18 MB peak)</div>
      <div><span class="info">INFO</span> [12:23:58] SAVEPOINT before settings reset prepared</div>
    </div>
  `;
}

function openLibrary() {
  els.libraryOverlay.classList.add("open");
  renderLibrary();
}

function closeLibrary() {
  els.libraryOverlay.classList.remove("open");
}

function filteredBlueprints() {
  return blueprints.filter(bp => {
    const q = state.search.trim().toLowerCase();
    const hay = (bp[0] + " " + bp[1] + " " + bp[2]).toLowerCase();
    const cat = state.category;
    const catOk = cat === "All" || (cat === "Featured" ? blueprints.indexOf(bp) < 5 : hay.includes(cat.toLowerCase()));
    return catOk && (!q || hay.includes(q));
  });
}

function renderLibrary() {
  const list = filteredBlueprints();
  els.libraryOverlay.innerHTML = `
    <div class="library-shell">
      <aside class="library-side">
        <h3>Library</h3>
        ${categories.map(cat => `<button class="cat-btn ${state.category === cat ? "active" : ""}" type="button" data-category="${cat}"><span>${cat}</span><span>${cat === "All" ? 43 : cat === "Featured" ? 5 : ""}</span></button>`).join("")}
      </aside>
      <section class="library-main">
        <div class="library-top">
          <h2>Blueprint Library</h2>
          <input class="text-input" id="librarySearch" value="${state.search}" placeholder="Search blueprints" aria-label="Search blueprints">
          <button class="icon-btn" type="button" id="closeLibrary" aria-label="Close Library"><svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
        </div>
        <div class="library-grid">
          ${list.map(bp => `<button class="bp-card" type="button" data-blueprint="${bp[0]}"><span class="bp-swatch"></span><h4>${bp[0]}</h4><p>${bp[1]}</p><span class="tag-row">${bp[2].split(",").slice(0, 3).map(t => `<span class="tag">${t.trim()}</span>`).join("")}</span></button>`).join("")}
        </div>
      </section>
    </div>
  `;
}

function openReset(final = false) {
  els.resetOverlay.classList.add("open");
  if (final) {
    els.resetOverlay.innerHTML = `
      <div class="modal-card">
        <div class="notice success">Reset complete. The pre-flight savepoint remains available in local browser storage.</div>
        <h2>Playground restarted</h2>
        <p>WordPress and PHP versions were applied, the site was reset, and the iframe is back online.</p>
        <div class="modal-actions"><button class="primary-btn" type="button" id="doneReset">Done</button></div>
      </div>
    `;
    return;
  }
  els.resetOverlay.innerHTML = `
    <div class="modal-card">
      <h2>Apply Settings & Reset Playground</h2>
      <p>This destructive reset wipes the running site after taking a local pre-flight savepoint. Type the site name to continue.</p>
      <div class="diff"><div><span class="old">PHP 8.2</span> -> <span class="new">PHP 8.3</span></div><div><span class="old">WordPress 6.7 stable</span> -> <span class="new">WordPress 6.8 RC</span></div><div><span class="new">Savepoint:</span> Coffee Shop before reset</div></div>
      <input class="text-input" id="resetPhrase" placeholder="Type ${state.activeSite}" aria-label="Confirm reset">
      <div class="modal-actions"><button class="ghost-btn" type="button" id="cancelReset">Cancel</button><button class="danger-btn" type="button" id="confirmReset" disabled>Reset Playground</button></div>
    </div>
  `;
}

function closeReset() {
  els.resetOverlay.classList.remove("open");
  els.resetOverlay.innerHTML = "";
}

document.addEventListener("click", event => {
  const rail = event.target.closest("[data-pane]");
  if (rail) openPane(rail.dataset.pane);

  if (event.target.closest("#siteWidget")) {
    state.pane = "sites";
    state.sitesSegment = "yours";
    renderPane();
  }
  if (event.target.closest("#closePane")) closePane();
  if (event.target.closest("#moreBtn")) els.moreMenu.classList.toggle("open");
  if (!event.target.closest("#moreBtn") && !event.target.closest("#moreMenu")) els.moreMenu.classList.remove("open");

  const sitesSeg = event.target.closest("[data-sites-segment]");
  if (sitesSeg) {
    state.sitesSegment = sitesSeg.dataset.sitesSegment;
    renderSites();
  }

  const managerTab = event.target.closest("[data-manager-tab]");
  if (managerTab) {
    state.managerTab = managerTab.dataset.managerTab;
    renderManager();
  }

  const resume = event.target.closest("[data-resume]");
  if (resume) {
    state.activeSite = resume.dataset.resume;
    state.saveState = resume.dataset.resume === "Unsaved Playground" ? "unsaved" : "saved";
    boot("Resuming saved Playground", "Mounting " + resume.dataset.resume + " from browser storage.", () => {
      updateChrome();
      showToast("Playground resumed", resume.dataset.resume + " is running locally.");
    });
  }

  const start = event.target.closest("[data-start]");
  if (start) {
    state.activeSite = start.dataset.start;
    state.saveState = "unsaved";
    boot("Booting " + start.dataset.start, "Preparing WordPress, PHP, SQLite, and requested source.", () => {
      setIframe("/");
      updateChrome();
      showToast("Playground started", start.dataset.start + " is ready.");
    });
  }

  const bp = event.target.closest("[data-blueprint]");
  if (bp) {
    const name = bp.dataset.blueprint;
    closeLibrary();
    state.activeSite = name;
    state.saveState = "unsaved";
    boot("Booting blueprint", name + " blueprint is applying steps.", () => {
      setIframe("/");
      updateChrome();
      showToast("Blueprint ready", name + " is running in the iframe.");
    });
  }

  if (event.target.closest("#openLibrary")) openLibrary();
  if (event.target.closest("#closeLibrary")) closeLibrary();

  const cat = event.target.closest("[data-category]");
  if (cat) {
    state.category = cat.dataset.category;
    renderLibrary();
  }

  const pathBtn = event.target.closest("[data-path]");
  if (pathBtn) {
    state.path = pathBtn.dataset.path;
    setIframe(state.path);
    updateChrome();
  }

  const action = event.target.closest("[data-action]");
  if (action) {
    const label = action.dataset.action;
    const title = label === "export-pr" ? "Export prepared" : label === "download-zip" ? "Download ready" : label === "copy-blueprint" ? "Blueprint link copied" : "Bundle ready";
    const text = label === "export-pr" ? "GitHub PR export is queued from the current wp-content selection." : label === "download-zip" ? "The current playground can be downloaded as a .zip file." : label === "copy-blueprint" ? "Blueprint URL copied to clipboard." : "Blueprint bundle download prepared.";
    showToast(title, text);
  }

  if (event.target.closest("[data-run-blueprint]")) {
    boot("Running Blueprint", "Rebooting with the edited blueprint JSON.", () => showToast("Blueprint applied", "The edited blueprint finished running."));
  }

  if (event.target.closest("[data-save-local]") || event.target.closest("#saveBtn")) saveSite();
  if (event.target.closest("#refreshBtn")) {
    setIframe(state.path);
    showToast("Iframe refreshed", state.path + " reloaded.");
  }
  if (event.target.closest("#fullscreenBtn")) {
    showToast("Fullscreen route", "The iframe would enter fullscreen with the current path.");
  }
  if (event.target.closest("#resetBtn")) openReset(false);
  if (event.target.closest("#cancelReset")) closeReset();
  if (event.target.closest("#doneReset")) closeReset();
  if (event.target.closest("#confirmReset")) {
    closeReset();
    boot("Resetting Playground", "Applying runtime changes and restarting WordPress.", () => {
      state.saveState = "unsaved";
      updateChrome();
      openReset(true);
    });
  }
});

document.addEventListener("input", event => {
  if (event.target.id === "librarySearch") {
    state.search = event.target.value;
    renderLibrary();
    const input = document.getElementById("librarySearch");
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }
  if (event.target.id === "resetPhrase") {
    const confirm = document.getElementById("confirmReset");
    confirm.disabled = event.target.value !== state.activeSite;
  }
});

document.getElementById("addressForm").addEventListener("submit", event => {
  event.preventDefault();
  state.path = els.pathInput.value || "/";
  setIframe(state.path);
  updateChrome();
});

function saveSite() {
  state.saveState = "saving";
  updateChrome();
  window.setTimeout(() => {
    state.saveState = "saved";
    updateChrome();
    showToast("Saved locally", state.activeSite + " is stored in browser OPFS.");
  }, 650);
}

if (location.hash === "#sites") state.pane = "sites";
if (location.hash === "#manager") state.pane = "manager";
if (location.hash === "#library") {
  state.pane = "sites";
  state.sitesSegment = "library";
  window.setTimeout(openLibrary, 100);
}
if (location.hash === "#reset") {
  state.pane = "manager";
  window.setTimeout(() => openReset(false), 100);
}

setIframe(state.path);
renderPane();
updateChrome();
</script>
</body>
</html>
